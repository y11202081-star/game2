<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的超萌白雪貂</title>
    <style>
        /* 基本背景與版面 */
        body { 
            background-color: #ffebee; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 遊戲主容器 - 確保有白色背景與邊框 */
        #game-box { 
            background: #ffffff; 
            width: 360px; 
            padding: 20px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            text-align: center;
            border: 3px solid #f8bbd0;
        }

        /* 雪貂展示區域 */
        .stage {
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 20px 0;
            background: #fffafa;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        /* 雪貂主體 - 站立白色長條形 */
        .ferret {
            width: 70px;
            height: 160px;
            background: #ffffff; /* 純白身體 */
            border: 2px solid #eeeeee;
            border-radius: 40px 40px 20px 20px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            z-index: 10;
        }

        /* 耳朵 */
        .ear {
            position: absolute;
            top: -8px;
            width: 22px;
            height: 22px;
            background: #ffffff;
            border: 2px solid #eeeeee;
            border-radius: 50%;
        }
        .ear.left { left: 0px; }
        .ear.right { right: 0px; }

        /* 臉部細節 */
        .eye {
            position: absolute;
            top: 35px;
            width: 7px;
            height: 7px;
            background: #222;
            border-radius: 50%;
        }
        .eye.left { left: 18px; }
        .eye.right { right: 18px; }

        .nose {
            position: absolute;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 6px;
            background: #ffc1cc;
            border-radius: 5px;
        }

        /* 站立的手手 */
        .hand {
            position: absolute;
            top: 85px;
            width: 14px;
            height: 20px;
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 10px;
        }
        .hand.left { left: 10px; transform: rotate(10deg); }
        .hand.right { right: 10px; transform: rotate(-10deg); }

        /* 動畫效果 */
        @keyframes dance {
            0% { transform: translateY(0) rotate(0); }
            25% { transform: translateY(-30px) rotate(10deg); }
            50% { transform: translateY(0) rotate(-10deg); }
            75% { transform: translateY(-30px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0); }
        }
        .dancing { animation: dance 0.5s infinite; }

        /* 狀態條 */
        .bar-container { margin: 15px 0; text-align: left; }
        .bar-label { font-size: 14px; color: #880e4f; margin-bottom: 5px; font-weight: bold; }
        .bar-bg { background: #fce4ec; height: 14px; border-radius: 7px; overflow: hidden; }
        .bar-fill { background: #ec407a; height: 100%; width: 100%; transition: width 0.3s; }

        /* 按鈕 */
        .btn-group { display: flex; justify-content: space-around; margin-top: 20px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            background: #ad1457;
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px #880e4f;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #880e4f; }
        #log { margin-top: 15px; color: #888; font-size: 13px; height: 20px; }
    </style>
</head>
<body>

    <div id="game-box">
        <h2 style="color: #ad1457; margin: 0;">🤍 我的白雪貂 🤍</h2>
        
        <div class="stage">
            <!-- 雪貂主體 -->
            <div id="my-ferret" class="ferret">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="nose"></div>
                <div class="hand left"></div>
                <div class="hand right"></div>
            </div>
        </div>

        <div class="bar-container">
            <div class="bar-label">肚子餓度</div>
            <div class="bar-bg"><div id="h-bar" class="bar-fill"></div></div>
            
            <div class="bar-label">幸福指數</div>
            <div class="bar-bg"><div id="s-bar" class="bar-fill" style="background: #f06292;"></div></div>
        </div>

        <div class="btn-group">
            <button onclick="feedFerret()">餵乾乾</button>
            <button onclick="playFerret()">玩隧道</button>
        </div>

        <div id="log">雪貂正歪著頭看著你...</div>
    </div>

    <script>
        // 遊戲數值
        let hunger = 70;
        let smile = 50;
        const ferret = document.getElementById('my-ferret');
        const log = document.getElementById('log');

        // 更新畫面
        function refresh() {
            document.getElementById('h-bar').style.width = hunger + '%';
            document.getElementById('s-bar').style.width = smile + '%';
        }

        // 餵食動作
        function feedFerret() {
            if (hunger >= 100) {
                log.innerText = "雪貂吃不下了，扭過頭去。";
                return;
            }
            hunger = Math.min(100, hunger + 20);
            log.innerText = "雪貂開心地吃著乾乾，發出喀喀聲！";
            refresh();
        }

        // 玩耍動作 (戰爭舞)
        function playFerret() {
            smile = Math.min(100, smile + 25);
            hunger = Math.max(0, hunger - 10);
            
            // 觸發舞蹈動畫
            ferret.classList.add('dancing');
            log.innerText = "雪貂興奮地跳起戰爭舞！Dook Dook！";
            
            setTimeout(() => {
                ferret.classList.remove('dancing');
            }, 1500);
            
            refresh();
        }

        // 數值隨時間自動下降 (每4秒)
        setInterval(() => {
            hunger = Math.max(0, hunger - 2);
            smile = Math.max(0, smile - 1);
            refresh();
        }, 4000);

        // 初始化
        refresh();
    </script>
</body>
</html>
